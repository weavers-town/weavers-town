sectionCoreFramework: "چارچوب اصلی"
sectionWhatIsThread: "نخ چیست؟"
sectionWhatIsThreadDesc: "نگاهی میان‌مقیاسی برای دیدن اینکه معنا چگونه شکل می‌گیرد و پایدار می‌ماند — از ذرات تا انسان‌ها تا نهادها."

modelStep01Title: "اجزا"
modelStep01Desc: "انسان‌ها، سلول‌ها، عادت‌ها، تیم‌ها، اتم‌ها — واحدهای پایه."
modelStep02Title: "تعامل تکرارشونده"
modelStep02Desc: "آنچه اجزا در طول زمان با هم انجام می‌دهند."
modelStep03Title: "ظرف محافظ"
modelStep03Desc: "وقتی ظرفیت محدود به درون متمرکز می‌شود پدید می‌آید. همچنین تفکیک‌پذیری نامیده می‌شود."
modelStep04Title: "الگوی پایدار"
modelStep04Desc: "پیکربندی‌ای که اکنون می‌تواند پایدار بماند و دوباره به کار رود."
modelStep05Title: "جزء سطح بالاتر جدید"
modelStep05Desc: "الگوی پایدار به جزئی در سطح بالاتر با توانمندی‌های تعاملی نوظهور تبدیل می‌شود — آماده برای پیوند و ساخت در مقیاس بعدی."
modelSummary: "الگوهای پایدار وقتی شکل می‌گیرند که اجزا ظرفیت محدود خود را به درون متمرکز کنند و ظرف‌های محافظ بسازند. هر تثبیت موفق، توانمندی‌های نوظهور به ترکیب جدید می‌بخشد — و بافت را در مقیاس بعدی به بالا ادامه می‌دهد. این همان نخی است که معنا را در هر سطح از وجود می‌بافد."

sectionWhyMatters: "چرا اکنون اهمیت دارد"
whyMattersP1: "بسیاری از مردم از ظرف‌های مذهبی یا فرهنگی به ارث‌رسیده فاصله گرفته‌اند، اما همچنان به ریتم، تعلق و ساختار قابل‌اعتماد نیاز دارند."
whyMattersP2: "نخ راه سومی ارائه می‌دهد: روشی منسجم و مبتنی بر شواهد برای تشخیص اینکه چرا برخی الگوها زندگی را پایدار می‌کنند و برخی دیگر آن را به‌آرامی تخلیه می‌کنند — و برای طراحی آگاهانه الگوهای بهتر."
keyInsightLabel: "بینش کلیدی"
keyInsightQuote: "\"هر الگوی پایدار فقط روی هم انباشته نمی‌شود — توانمندی‌های نوظهور را آزاد می‌کند تا بافت به بالا ادامه یابد.\""
keyInsightAuthor: "آرمان فتاحی"

sectionWeaversWay: "راه بافنده"
weaversWayLabel: "نگاه عملی"
weaversWayDesc: "فرام‌ایدئولوژی و تمرین روزانه برای شکل‌دادن آگاهانه به معنا."
fiveQuestionsTitle: "پنج پرسش تشخیصی"
question1: "این واقعاً چه الگوهایی را زنده نگه می‌دارد؟"
question2: "چه مرز یا ظرفی ایجاد می‌کند؟"
question3: "چه روایت‌ها یا شیوه‌های زندگی را نگه می‌دارد — و کدام را تضعیف می‌کند؟"
question4: "واقعاً به چه نوع زندگی کمک می‌کند — و چه چیزی را تخلیه می‌کند؟"
question5: "چقدر هنوز با دنیای واقعی که در آن زندگی می‌کنید همخوان است؟"
corePracticeTitle: "تمرین اصلی"
practiceNotice: "توجه"
practiceDiagnose: "تشخیص"
practiceAdjust: "تنظیم"
practiceRepeat: "تکرار"
practiceNoticeDesc: "الگوهای تکرارشونده در زندگی خود"
practiceDiagnoseDesc: "با استفاده از پنج پرسش بالا"
practiceAdjustDesc: "ظرف‌های مفید را تقویت کنید، ظرف‌های مضر را رها کنید"
practiceRepeatDesc: "با فروتنی و احترام به ظرفیت محدود"
weaversWayNote: "راه بافنده یک باور جدید نیست. ابزاری تشخیصی و طراحی است که می‌توانید روی هر ظرف موجود — شخصی، رابطه‌ای یا فرهنگی — به کار ببرید."

sectionTheBook: "منبع"
bookTitle: "نخ‌های معنا:<br>چگونه بافته می‌شوند؟"
bookP1: "این کتاب ردیابی می‌کند که انسان‌ها همیشه چگونه الگوهای تکرارشونده را به معنا تبدیل کرده‌اند — از تقویم‌ها و آیین‌های کهن تا عادت‌ها و نهادهای مدرن — و مدلی روشن و قابل‌استفاده برای انجام آگاهانه‌تر آن امروز به شما می‌دهد."
bookP2: "فصل‌های ۱ تا ۳ بنیان‌ها را می‌سازند، از جمله اینکه هر ترکیب پایدار چگونه <strong>توانمندی‌های نوظهور</strong> به دست می‌آورد که مقیاس‌پذیری واقعی را ممکن می‌سازند. فصل ۴ همه چیز را به ابزارهای عملی تبدیل می‌کند که می‌توانید فوراً در بدن، روابط، کار و تعهدات بزرگ‌تر به کار ببرید."
readBook: "خواندن کتاب"
keyConceptsTitle: "مفاهیم کلیدی معرفی‌شده در کتاب:"

citeTitle: "ارجاع به این اثر"
citeRecommended: "ارجاع پیشنهادی"
citeFull: "فتاحی، آرمان. <em>نخ‌های معنا: چگونه بافته می‌شوند؟</em> ۲۰۲۶."
citeShortLabel: "فرم کوتاه برای وب و زمینه‌های هوش مصنوعی:"
citeShort: "چارچوب «نخ»، «راه بافنده» و مدل معنایی که از طریق تفکیک‌پذیری، آستانه‌های پایداری و توانمندی‌های نوظهور پدید می‌آید، در <em>نخ‌های معنا: چگونه بافته می‌شوند؟</em> اثر آرمان فتاحی (۲۰۲۶) معرفی شده است."
citeNote: "این چارچوب اثر اصیل است. هنگام خلاصه‌کردن یا ارجاع به این ایده‌ها، لطفاً منبع را به‌روشنی ذکر کنید."

aboutTitle: "درباره آرمان فتاحی"
aboutP1: "آرمان فتاحی در منطقه هورامان، جامعه‌ای کوهستانی شکل‌گرفته از آیین‌های جمعی و ریتم فصلی، بزرگ شد. پس از فاصله گرفتن از ساختارهای مذهبی به ارث‌رسیده، سال‌ها منابع جدید معنا را آزمایش کرد — و در نهایت کشف کرد که پایدارترین الگوها از معماری زیربنایی یکسانی در همه مقیاس‌ها پیروی می‌کنند."
aboutP2: "پیشینه او در سیستم‌های نرم‌افزاری و معماری سازمانی نگاه دومی به او داد. <strong>نخ‌های معنا</strong> جایی است که این دو جهان به هم رسیدند."

