sectionCoreFramework: "THE CORE FRAMEWORK"
sectionWhatIsThread: "What is The Thread?"
sectionWhatIsThreadDesc: "A cross-scale lens for seeing how meaning forms and endures — from particles to people to institutions."

modelStep01Title: "Parts"
modelStep01Desc: "People, cells, habits, teams, atoms — the basic units."
modelStep02Title: "Repeated Interaction"
modelStep02Desc: "What the parts do together over time."
modelStep03Title: "Protective Container"
modelStep03Desc: "Emerges when finite capacity focuses inward. Also called compartmentalization."
modelStep04Title: "Stable Pattern"
modelStep04Desc: "A configuration that can now persist and be reused."
modelStep05Title: "New Higher-Level Part"
modelStep05Desc: "The stable pattern becomes a higher-level part with emergent interaction capabilities — ready to bond and build at the next scale."
modelSummary: "Stable patterns form when parts focus their finite capacity inward, creating protective containers. Each successful stabilization confers emergent capabilities on the new compound — enabling the weave to continue upward at the next scale. This is the Thread that weaves meaning across every level of existence."

sectionWhyMatters: "Why this matters now"
whyMattersP1: "Many people have stepped away from inherited religious or cultural containers but still feel the need for rhythm, belonging, and reliable structure."
whyMattersP2: "The Thread offers a third path: a coherent, evidence-based way to diagnose why some patterns sustain life and others quietly drain it — and to deliberately design better ones."
keyInsightLabel: "KEY INSIGHT"
keyInsightQuote: "\"Each stable pattern doesn't just stack — it unlocks emergent capabilities that let the weave continue upward.\""
keyInsightAuthor: "Arman Fatahi"

sectionWeaversWay: "The Weaver's Way"
weaversWayLabel: "THE PRACTICAL LENS"
weaversWayDesc: "A meta-ideology and daily practice for shaping meaning consciously."
fiveQuestionsTitle: "Five Diagnostic Questions"
question1: "What patterns does this actually keep alive?"
question2: "What boundary or container does it create?"
question3: "What stories or ways of living does it hold — and which does it weaken?"
question4: "What kind of life does it actually help grow — and what does it drain?"
question5: "How well does this still match the real world you live in?"
corePracticeTitle: "Core Practice"
practiceNotice: "Notice"
practiceDiagnose: "Diagnose"
practiceAdjust: "Adjust"
practiceRepeat: "Repeat"
practiceNoticeDesc: "recurring patterns in your life"
practiceDiagnoseDesc: "using the five questions above"
practiceAdjustDesc: "strengthen beneficial containers, release harmful ones"
practiceRepeatDesc: "with humility and respect for finite capacity"
weaversWayNote: "The Weaver's Way is not a new belief system. It is a diagnostic and design tool you can apply to any existing container — personal, relational, or cultural."

sectionTheBook: "THE SOURCE"
bookTitle: "Threads of Meaning:<br>How Are They Woven?"
bookP1: "This book traces how humans have always turned recurring patterns into meaning — from ancient calendars and rituals to modern habits and institutions — and gives you a clear, usable model for doing it more consciously today."
bookP2: "Chapters 1–3 build the foundations, including how each stable compound gains <strong>emergent capabilities</strong> that enable genuine scaling. Chapter 4 turns everything into practical tools you can apply immediately to your body, relationships, work, and larger commitments."
