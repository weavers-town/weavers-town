aboutTitle: "About Arman Fatahi"
aboutP1: "Arman Fatahi grew up in Hawraman region, a mountain community shaped by communal ritual and seasonal rhythm. After drifting from inherited religious structures, he spent years experimenting with new sources of meaning — eventually discovering that the most durable patterns followed the same underlying architecture across scales."
aboutP2: "His background in software systems and enterprise architecture gave him a second lens. <strong>Threads of Meaning</strong> is where those two worlds met."

