aboutTitle: "Về Arman Fatahi"
aboutP1: "Arman Fatahi lớn lên ở vùng Hawraman, một cộng đồng núi được định hình bởi nghi lễ cộng đồng và nhịp điệu theo mùa. Sau khi xa dần các cấu trúc tôn giáo thừa kế, anh dành nhiều năm thử nghiệm các nguồn ý nghĩa mới — cuối cùng phát hiện rằng các mẫu bền vững nhất tuân theo cùng một kiến trúc nền tảng xuyên quy mô."
aboutP2: "Nền tảng của anh trong hệ thống phần mềm và kiến trúc doanh nghiệp mang đến một lăng kính thứ hai. <strong>Chỉ Duyên Nghĩa</strong> là nơi hai thế giới đó gặp nhau."

