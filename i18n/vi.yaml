sectionCoreFramework: "KHUNG CỐT LÕI"
sectionWhatIsThread: "Sợi Chỉ là gì?"
sectionWhatIsThreadDesc: "Một lăng kính xuyên quy mô để nhìn thấy ý nghĩa hình thành và tồn tại — từ hạt đến con người đến các thể chế."

modelStep01Title: "Các phần"
modelStep01Desc: "Con người, tế bào, thói quen, nhóm, nguyên tử — những đơn vị cơ bản."
modelStep02Title: "Tương tác lặp lại"
modelStep02Desc: "Những gì các phần làm cùng nhau theo thời gian."
modelStep03Title: "Vỏ bảo vệ"
modelStep03Desc: "Nổi lên khi năng lực hữu hạn tập trung vào bên trong. Còn gọi là ngăn chia."
modelStep04Title: "Mẫu ổn định"
modelStep04Desc: "Một cấu hình giờ có thể tồn tại và được tái sử dụng."
modelStep05Title: "Phần cấp cao hơn mới"
modelStep05Desc: "Mẫu ổn định trở thành một phần cấp cao hơn với khả năng tương tác mới nổi — sẵn sàng liên kết và xây dựng ở quy mô tiếp theo."
modelSummary: "Các mẫu ổn định hình thành khi các phần tập trung năng lực hữu hạn vào bên trong, tạo ra các vỏ bảo vệ. Mỗi lần ổn định thành công trao khả năng mới nổi cho hợp chất mới — cho phép mạch dệt tiếp tục leo lên ở quy mô tiếp theo. Đây là Sợi Chỉ dệt ý nghĩa xuyên suốt mọi cấp độ tồn tại."

sectionWhyMatters: "Tại sao điều này quan trọng ngay bây giờ"
whyMattersP1: "Nhiều người đã bước ra khỏi các vỏ tôn giáo hoặc văn hóa thừa kế nhưng vẫn cảm thấy cần nhịp điệu, sự thuộc về và cấu trúc đáng tin cậy."
whyMattersP2: "Sợi Chỉ mang đến con đường thứ ba: một cách mạch lạc, dựa trên bằng chứng để chẩn đoán tại sao một số mẫu duy trì sự sống và những mẫu khác âm thầm làm cạn kiệt nó — và để thiết kế có chủ ý những mẫu tốt hơn."
keyInsightLabel: "ĐIỂM THEN CHỐT"
keyInsightQuote: "\"Mỗi mẫu ổn định không chỉ chồng lên nhau — nó mở khóa khả năng mới nổi để mạch dệt tiếp tục leo lên.\""
keyInsightAuthor: "Arman Fatahi"

sectionWeaversWay: "Con Đường Người Dệt"
weaversWayLabel: "LĂNG KÍNH THỰC HÀNH"
weaversWayDesc: "Một siêu hệ tư tưởng và thực hành hàng ngày để định hình ý nghĩa một cách có ý thức."
fiveQuestionsTitle: "Năm câu hỏi chẩn đoán"
question1: "Mẫu này thực sự giữ sống những gì?"
question2: "Nó tạo ra ranh giới hay vỏ chứa nào?"
question3: "Nó giữ những câu chuyện hay cách sống nào — và làm yếu đi những gì?"
question4: "Nó thực sự giúp phát triển kiểu sống nào — và làm cạn kiệt điều gì?"
question5: "Nó còn phù hợp với thế giới thực bạn đang sống đến mức nào?"
corePracticeTitle: "Thực hành cốt lõi"
practiceNotice: "Nhận biết"
practiceDiagnose: "Chẩn đoán"
practiceAdjust: "Điều chỉnh"
practiceRepeat: "Lặp lại"
practiceNoticeDesc: "các mẫu lặp lại trong cuộc sống của bạn"
practiceDiagnoseDesc: "bằng năm câu hỏi ở trên"
practiceAdjustDesc: "củng cố các vỏ có lợi, buông bỏ các vỏ có hại"
practiceRepeatDesc: "với khiêm tốn và tôn trọng năng lực hữu hạn"
weaversWayNote: "Con Đường Người Dệt không phải một hệ tín ngưỡng mới. Đây là công cụ chẩn đoán và thiết kế bạn có thể áp dụng cho bất kỳ vỏ chứa hiện có nào — cá nhân, quan hệ hay văn hóa."

sectionTheBook: "NGUỒN GỐC"
bookTitle: "Chỉ Duyên Nghĩa:<br>Chúng Được Dệt Như Thế Nào?"
bookP1: "Cuốn sách này truy vết cách con người luôn biến các mẫu lặp lại thành ý nghĩa — từ lịch cổ đại và nghi lễ đến thói quen và thể chế hiện đại — và đưa cho bạn một mô hình rõ ràng, có thể dùng được để làm điều đó có ý thức hơn ngày nay."
bookP2: "Các chương 1–3 xây dựng nền tảng, bao gồm cách mỗi hợp chất ổn định đạt được <strong>khả năng mới nổi</strong> cho phép mở rộng thực sự. Chương 4 biến tất cả thành công cụ thực hành bạn có thể áp dụng ngay cho cơ thể, các mối quan hệ, công việc và các cam kết lớn hơn."
