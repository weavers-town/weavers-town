baseURL = "https://weavers.town/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
disableKinds = ["taxonomy", "term", "RSS"]

[languages]
  [languages.en]
    locale = "en-us"
    languageName = "English"
    label = "English"
    weight = 1
    title = "Weaver's Town"
    contentDir = "content"
    [languages.en.params]
      author = "Arman Fatahi"
      description = "The Thread is a practical, cross-scale framework for understanding how meaning emerges when stable patterns gain emergent capabilities that enable participation at the next scale."
      dir = "ltr"
      languageShort = "EN"

  [languages.vi]
    locale = "vi"
    languageName = "Tiếng Việt"
    label = "Tiếng Việt"
    weight = 2
    title = "Thị trấn Người Dệt"
    contentDir = "content/vi"
    [languages.vi.params]
      author = "Arman Fatahi"
      description = "Sợi Chỉ là một khung thực hành xuyên quy mô để hiểu ý nghĩa hình thành khi các mẫu ổn định đạt được khả năng mới nổi, cho phép tham gia ở quy mô tiếp theo."
      dir = "ltr"
      languageShort = "VI"

  # Example for a future Persian locale:
  # [languages.fa]
  #   locale = "fa"
  #   languageName = "فارسی"
  #   label = "فارسی"
  #   weight = 3
  #   title = "شهر بافندگان"
  #   contentDir = "content/fa"
  #   [languages.fa.params]
  #     dir = "rtl"
  #     languageShort = "FA"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true