source_dir: content/explorations
target_dir: content/vi/explorations
state_file: .translation/state.json

source_language: English
target_language: Vietnamese
target_locale: vi-VN

providers:
  xai:
    base_url: https://api.x.ai/v1
    api_key_env: XAI_API_KEY
    default_model: grok-4-1-fast-non-reasoning
  openai:
    base_url: null
    api_key_env: OPENAI_API_KEY
    default_model: gpt-4o-mini

frontmatter_translate_keys:
  - title
  - summary
  - description
  - audio_title

frontmatter_preserve_keys:
  - date
  - draft
  - audio
  - weight
  - slug

static_translations:
  "Listen to this article": "Nghe bài viết này"
  "Explorations": "Khám Phá"

glossary:
  "The Thread": "Sợi Chỉ"
  "Weaver's Way": "Con Đường Người Dệt"
  "Weaver's Town": "Thị trấn Người Dệt"
  "Weavers": "Những Người Dệt"
  "Threads of Meaning": "Chỉ Duyên Nghĩa"
  "Stability Drive": "Động Lực Ổn Định"
  "Grand Search": "Cuộc Tìm Kiếm Lớn"
  "Stability Threshold": "Ngưỡng Ổn Định"
  "Stability Reservoirs": "Kho Ổn Định"
  "Finite Capacity": "Năng Lực Hữu Hạn"
  "Emergent Capabilities": "Khả Năng Mới Nổi"
  "protective containers": "vỏ bảo vệ"
  "Protective Container": "Vỏ Bảo Vệ"