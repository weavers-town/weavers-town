source_dir: content/explorations
target_dir: content/fa/explorations
state_file: .translation/state-fa.json

source_language: English
target_language: Persian (Farsi)
target_locale: fa-IR

providers:
  xai:
    base_url: https://api.x.ai/v1
    api_key_env: XAI_API_KEY
    default_model: grok-4-1-fast-non-reasoning
  openai:
    base_url: null
    api_key_env: OPENAI_API_KEY
    default_model: gpt-4o-mini

frontmatter_translate_keys:
  - title
  - summary
  - description
  - audio_title

frontmatter_preserve_keys:
  - date
  - draft
  - audio
  - weight
  - slug

static_translations:
  "Listen to this article": "گوش دادن به این مقاله"
  "Explorations": "کاوش‌ها"

glossary:
  "The Thread": "نخ"
  "Weaver's Way": "راه بافنده"
  "Weaver's Town": "شهر بافندگان"
  "Weavers": "بافندگان"
  "Threads of Meaning": "نخ‌های معنا"
  "Stability Drive": "نیروی پایداری"
  "Grand Search": "جستجوی بزرگ"
  "Stability Threshold": "آستانه پایداری"
  "Stability Reservoirs": "مخازن پایداری"
  "Finite Capacity": "ظرفیت محدود"
  "Emergent Capabilities": "توانمندی‌های نوظهور"
  "protective containers": "ظرف‌های محافظ"
  "Protective Container": "ظرف محافظ"