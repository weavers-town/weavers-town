api_url: https://api.x.ai/v1/tts
api_key_env: XAI_API_KEY
state_file: .audio/explorations-state.json

voice_id: leo
speed: 1.0
max_chunk_chars: 6000

output_format:
  codec: mp3
  sample_rate: 24000
  bit_rate: 128000

# Optional shorter audio filenames for long exploration slugs.
audio_names:
  the-week-rhythm-we-wove: the-week-rhythm
  why-your-gym-membership-collects-dust: gym-membership
  what-do-companies-eat-reservoirs-funding-and-the-need-to-digest: what-do-companies-eat

locales:
  en:
    content_dir: content/explorations
    language: en
    output_dir: static/audio
    audio_path_prefix: ""
    spoken_label: "Exploration"
    audio_title: "Listen to this article"
  vi:
    content_dir: content/vi/explorations
    language: vi
    output_dir: static/audio/vi
    audio_path_prefix: "vi/"
    spoken_label: "Khám phá"
    audio_title: "Nghe bài viết này"
  fa:
    content_dir: content/fa/explorations
    language: fa
    output_dir: static/audio/fa
    audio_path_prefix: "fa/"
    spoken_label: "کاوش"
    audio_title: "گوش دادن به این مقاله"