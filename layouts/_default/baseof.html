<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ if .IsHome }}The Thread | Weaver's Town{{ else }}Weaver's Town | {{ .Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="{{ site.Params.author }}" />
  <meta property="og:title" content="{{ if .IsHome }}The Thread | Weaver's Town{{ else }}Weaver's Town | {{ .Title }}{{ end }}" />
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="{{ site.Title }}" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:image" content="https://weavers.town/images/front-page.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ if .IsHome }}The Thread | Weaver's Town{{ else }}Weaver's Town | {{ .Title }}{{ end }}" />
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
  <meta name="twitter:image" content="https://weavers.town/images/front-page.jpg" />
  <meta name="twitter:site" content="@weaverstown" />
  <link rel="icon" href="/images/tom-logo.png" type="image/png" />
  <link rel="shortcut icon" href="/images/tom-logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/images/tom-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body class="content-page">
  {{ partial "header.html" . }}
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
</body>
</html>
