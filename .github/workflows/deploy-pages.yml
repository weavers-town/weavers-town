name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Generate English exploration audio
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          chmod +x ./scripts/generate-exploration-audio.sh
          ./scripts/generate-exploration-audio.sh --locale en || echo "English exploration audio skipped or failed."

      - name: Translate explorations to Vietnamese
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRANSLATION_PROVIDER: ${{ vars.TRANSLATION_PROVIDER || 'xai' }}
          TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL || 'grok-4-1-fast-non-reasoning' }}
        run: |
          chmod +x ./scripts/translate-explorations.sh
          ./scripts/translate-explorations.sh || echo "Translation skipped (no API key or no changes)."

      - name: Generate Vietnamese exploration audio
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          chmod +x ./scripts/generate-exploration-audio.sh
          ./scripts/generate-exploration-audio.sh --locale vi || echo "Vietnamese exploration audio skipped or failed."

      - name: Translate explorations to Farsi
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRANSLATION_PROVIDER: ${{ vars.TRANSLATION_PROVIDER || 'xai' }}
          TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL || 'grok-4-1-fast-non-reasoning' }}
        run: |
          chmod +x ./scripts/translate-explorations.sh
          ./scripts/translate-explorations.sh --config scripts/translation/config-fa.yaml || echo "Farsi translation skipped (no API key or no changes)."

      - name: Generate Farsi exploration audio
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          chmod +x ./scripts/generate-exploration-audio.sh
          ./scripts/generate-exploration-audio.sh --locale fa || echo "Farsi exploration audio skipped or failed."

      - name: Commit generated exploration audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --short -- content/explorations content/vi/explorations content/fa/explorations static/audio .audio .translation)" ]]; then
            echo "No exploration audio changes to commit."
            exit 0
          fi
          git add content/explorations content/vi/explorations content/fa/explorations static/audio .audio .translation
          git commit -m "Add exploration audio [skip ci]"
          git push

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4